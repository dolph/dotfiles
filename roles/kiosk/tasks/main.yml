- name: set timezone
  community.general.timezone:
    name: America/Chicago
  tags: timezone

- name: install xfce
  ansible.builtin.dnf:
    name: '@Xfce Desktop'
  tags: xfce

- name: boot into graphical desktop
  ansible.builtin.file:
    src: /lib/systemd/system/runlevel5.target
    path: /etc/systemd/system/default.target
    state: link
  tags: xfce

- name: automatically login on boot
  ansible.builtin.import_tasks: autologin.yml
  tags: autologin

- name: configure web browser
  ansible.builtin.import_tasks: browser.yml
  tags: browser

- name: hide the mouse when idle
  ansible.builtin.import_tasks: unclutter.yml
  tags: unclutter

- name: disable dnfdragora notifications
  ansible.builtin.import_tasks: dnfdragora.yml
  tags: dnfdragora

- name: keep the display on permanently
  ansible.builtin.import_tasks: stay-on.yml
  tags: stay-on

- name: configure autopilot
  ansible.builtin.import_tasks: autopilot.yml
  tags: autopilot
