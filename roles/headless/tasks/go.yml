- name: install golang
  ansible.builtin.dnf:
    name: golang

- name: create GOPATH
  ansible.builtin.file:
    path: "/home/{{ whoami }}/go"
    state: directory
    owner: "{{ whoami }}"
    group: "{{ whoami }}"

- name: install vim-go plugins
  become: true
  become_user: "{{ whoami }}"
  ansible.builtin.command: nvim +GoInstallBinaries +qall
  no_log: true # prevent vim from messing with ansible's stdout/stderr
