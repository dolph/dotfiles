- name: restart pulseaudio
  become_user: "{{ whoami }}"
  ansible.builtin.command: pulseaudio -k
  register: task
  failed_when: task.rc != 0 and 'No such process' not in task.stderr

- name: clear xkb cache
  ansible.builtin.shell:
    cmd: rm -rf /var/lib/xkb/*

- name: restart i3
  become_user: "{{ whoami }}"
  ansible.builtin.shell: unset I3SOCK; i3-msg restart
