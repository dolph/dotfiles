---
- name: Get current localectl status
  ansible.builtin.command:
    argv:
      - localectl
      - status
  register: desktop_localectl_status
  changed_when: false
  failed_when: false

- name: Set Caps Lock to Escape in X11 keymap
  ansible.builtin.command:
    argv:
      - localectl
      - set-x11-keymap
      - us
      - ""
      - ""
      - caps:escape
  become: true
  changed_when: true
  when:
    - desktop_localectl_status.rc == 0
    - "'X11 Options: caps:escape' not in desktop_localectl_status.stdout"
