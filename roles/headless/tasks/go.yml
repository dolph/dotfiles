- name: Install golang
  ansible.builtin.dnf:
    name: golang

- name: Create GOPATH
  ansible.builtin.file:
    path: "/home/{{ whoami }}/go"
    state: directory
    owner: "{{ whoami }}"
    group: "{{ whoami }}"
    mode: "0700"

- name: Install vim-go plugins
  become: true
  become_user: "{{ whoami }}"
  ansible.builtin.command: nvim +GoInstallBinaries +qall
  changed_when: true
  no_log: true # prevent vim from messing with ansible's stdout/stderr
