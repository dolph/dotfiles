---
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  fedora-versions:
    name: Determine current Fedora releases
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.query.outputs.matrix }}
    steps:
      - name: Query Bodhi for current stable releases
        id: query
        run: |
          matrix=$(curl -s 'https://bodhi.fedoraproject.org/releases/?state=current&rows_per_page=20' \
            | python3 -c "
          import sys, json
          import urllib.request

          d = json.load(sys.stdin)
          releases = [r for r in d['releases'] if r['id_prefix'] == 'FEDORA' and not r['version'].startswith('E')]
          versions = sorted(set(r['version'] for r in releases), key=int, reverse=True)

          available = []
          for ver in versions:
              url = f'https://hub.docker.com/v2/repositories/geerlingguy/docker-fedora{ver}-ansible/tags?page_size=1'
              try:
                  with urllib.request.urlopen(url, timeout=5) as r:
                      if json.loads(r.read()).get('count', 0) > 0:
                          available.append(ver)
              except Exception:
                  pass
              if len(available) == 2:
                  break

          print(json.dumps(available))
          ")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v25

  headless:
    name: headless (Fedora ${{ matrix.fedora }})
    runs-on: ubuntu-latest
    needs: fedora-versions
    strategy:
      fail-fast: false
      matrix:
        fedora: ${{ fromJson(needs.fedora-versions.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Run headless playbook in container
        run: |
          container_id=$(docker run --detach --privileged \
            --cgroupns=host \
            --volume=/sys/fs/cgroup:/sys/fs/cgroup:rw \
            --volume="${PWD}:/etc/ansible:ro" \
            geerlingguy/docker-fedora${{ matrix.fedora }}-ansible:latest)

          function cleanup { docker rm -f "$container_id"; }
          trap cleanup EXIT

          set +e
          docker exec --tty "$container_id" env TERM=xterm /etc/ansible/bootstrap.sh \
            2>&1 | tee /tmp/bootstrap.log
          bootstrap_status=${PIPESTATUS[0]}
          if [ "$bootstrap_status" -ne 0 ]; then
            tail -40 /tmp/bootstrap.log | while IFS= read -r line; do
              esc=$(printf '%s' "$line" | sed 's/%/%25/g; s/\r/%0D/g')
              echo "::error::bootstrap: $esc"
            done
            exit "$bootstrap_status"
          fi
          docker exec --tty "$container_id" env TERM=xterm \
            ANSIBLE_FORCE_COLOR=0 ANSIBLE_DIFF_ALWAYS=0 ANSIBLE_STDOUT_CALLBACK=default \
            ansible-playbook /etc/ansible/headless.yml 2>&1 | tee /tmp/play.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            awk '
              /^TASK \[/ { task = $0 }
              /FAILED!|^fatal:|^failed:|^\[ERROR\]:/ {
                gsub(/%/, "%25"); gsub(/\r/, "%0D")
                print "::error::play [" task "]: " $0
                # also dump up to 5 follow-up lines
                for (i = 0; i < 5; i++) {
                  if ((getline l) <= 0) break
                  gsub(/%/, "%25", l); gsub(/\r/, "%0D", l)
                  print "::error::play [" task "]: " l
                }
              }
            ' /tmp/play.log | head -50
          fi
          exit "$status"
