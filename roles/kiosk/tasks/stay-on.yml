- name: Remove screensavers
  ansible.builtin.dnf:
    name: xscreensaver*
    state: absent

- name: Disable display power management on boot
  become: true
  become_user: "{{ whoami }}"
  community.general.ini_file:
    path: /home/{{ whoami }}/.config/autostart/power-manager.desktop
    section: Desktop Entry
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    no_extra_spaces: true
    mode: "0600"
  with_dict:
    Name: Power Manager
    Exec: sh -c "sleep 60; xfce4-power-manager -q"
    Comment: Disable power manager
    Terminal: false
    Type: Application
    StartupNotify: false

- name: Disable display power management immediately
  become: true
  become_user: "{{ whoami }}"
  ansible.builtin.command: xfce4-power-manager -q
  async: 60
  poll: 0

- name: Disable energy star and screensaver on boot
  become: true
  become_user: "{{ whoami }}"
  community.general.ini_file:
    path: /home/{{ whoami }}/.config/autostart/energy-star.desktop
    section: Desktop Entry
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    no_extra_spaces: true
    mode: "0600"
  with_dict:
    Name: Disable Energy Star
    Exec: sh -c "sleep 60; xset -dpms; xset s noblank; xset s off;"
    Comment: Disable display power management
    Terminal: false
    Type: Application
    StartupNotify: false

- name: Disable energy star immediately
  become: true
  become_user: "{{ whoami }}"
  environment:
    DISPLAY: ":0.0"
  ansible.builtin.command: xset -dpms
  async: 60
  poll: 0
