---
- name: Install container tools
  ansible.builtin.dnf:
    name:
      - podman
      - buildah

- name: Authenticate with dockerhub
  ansible.builtin.command:
    cmd: podman login --username {{ dockerhub_username }} --password {{ dockerhub_token }}
  changed_when: true
  no_log: true
  when: dockerhub_username is defined
