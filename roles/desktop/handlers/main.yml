---
- name: Update the font cache
  ansible.builtin.command: fc-cache -v
  changed_when: true

- name: Restart pulseaudio
  become: true
  become_user: "{{ whoami }}"
  ansible.builtin.command: pulseaudio -k
  register: desktop_task
  changed_when: true
  failed_when: desktop_task.rc != 0 and 'No such process' not in desktop_task.stderr

- name: Clear xkb cache
  ansible.builtin.shell:
    cmd: rm -rf /var/lib/xkb/*
  changed_when: true

- name: Restart i3
  become: true
  become_user: "{{ whoami }}"
  ansible.builtin.shell: unset I3SOCK; i3-msg restart
  changed_when: true
